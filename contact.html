<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Contact Us - Mouse's Enchanted Adventures</title>
  <style>
    * {
      box-sizing: border-box;
    }

    body {
      background: linear-gradient(to bottom right, #6e2aa3, #1e2a78);
      color: white;
      font-family: Arial, sans-serif;
      text-align: center;
      padding: 20px;
      margin: 0;
      border: 10px solid #8e44ad;
      overflow-x: hidden;
    }

    header, footer {
      border: 2px solid #8e44ad;
      padding: 10px;
      margin-bottom: 20px;
    }

    h1 {
      color: #ff4d4d;
    }

    .menu-toggle {
      display: none;
      background: #8e44ad;
      border: none;
      color: white;
      font-size: 1.5rem;
      padding: 10px;
      cursor: pointer;
      margin-top: 10px;
    }

    nav ul {
      list-style-type: none;
      padding: 0;
      background-color: #8e44ad;
      display: flex;
      justify-content: center;
      gap: 20px;
      margin-top: 10px;
      border: 2px solid #8e44ad;
      flex-wrap: wrap;
    }

    nav ul li {
      display: inline;
    }

    nav ul li a {
      color: white;
      text-decoration: none;
      padding: 10px 20px;
      display: inline-block;
      transition: background-color 0.3s, color 0.3s;
    }

    nav ul li a:hover {
      background-color: #5dade2;
      color: black;
    }

    .contact-form {
      max-width: 500px;
      margin: 40px auto;
      background: linear-gradient(135deg, rgba(142,68,173,0.9), rgba(30,144,255,0.3));
      padding: 30px;
      border-radius: 15px;
      box-shadow: 0 0 25px rgba(142, 68, 173, 0.6);
    }

    .contact-form h2 {
      margin-bottom: 20px;
      font-size: 2em;
      color: #ff4d4d;
    }

    input, textarea {
      width: 100%;
      padding: 12px;
      margin: 10px 0 20px;
      border: none;
      border-radius: 8px;
      font-size: 1em;
      background-color: #333;
      color: white;
    }

    input::placeholder,
    textarea::placeholder {
      color: #bbb;
    }

    button {
      background-color: #8e44ad;
      color: white;
      padding: 12px 30px;
      border: none;
      cursor: pointer;
      border-radius: 8px;
      font-size: 1.1em;
      transition: background-color 0.3s, transform 0.2s;
    }

    button:hover {
      background-color: #6c3483;
      transform: scale(1.05);
    }

    footer {
      margin-top: 40px;
      font-size: 0.9em;
    }

    @media (max-width: 768px) {
      .menu-toggle {
        display: block;
        margin: 0 auto;
      }

      nav ul {
        display: none;
        flex-direction: column;
        align-items: center;
        width: 100%;
      }

      nav ul.show {
        display: flex;
      }

      nav ul li {
        display: block;
        width: 100%;
      }

      nav ul li a {
        width: 100%;
        text-align: center;
      }

      .contact-form {
        margin: 20px 10px;
        padding: 20px;
      }
    }
  </style>
</head>

<body>
  <header>
  <h1>Contact Us</h1>
  <button class="menu-toggle" onclick="toggleMenu()">☰ Menu</button> <!-- ✅ Add here -->
  <nav>
    <ul id="nav-menu">
      <li><a href="index.html">Home</a></li>
      <li><a href="product.html">Products</a></li>
      <li><a href="contact.html">Contact</a></li>
      <li><a href="about.html">About</a></li>
      <li><a href="cafe-door.html">Enter Café</a></li>
      
    </ul>
  </nav>
</header>


  <main>
    <section class="contact-form">
      <h2>Get in Touch</h2>
      <form action="https://formspree.io/f/xqapkayz" method="POST">
        <input type="text" name="name" placeholder="Your Name" required>
        <input type="email" name="email" placeholder="Your Email" required>
        <textarea name="message" rows="5" placeholder="Your Message" required></textarea>
        <button type="submit">Send Message</button>
      </form>
    </section>
  </main>

  <footer>
    <p>&copy; 2025 Mouse's Enchanted Adventures. All rights reserved.</p>
  </footer>

  <script>
    function toggleMenu() {
      const menu = document.getElementById('nav-menu');
      menu.classList.toggle('show');
    }
  </script>
</body>
</html>
