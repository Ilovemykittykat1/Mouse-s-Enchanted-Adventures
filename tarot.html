<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Mystic Tarot Reading – Mouse's Enchanted Adventures</title>
  <link href="https://fonts.googleapis.com/css2?family=Cinzel+Decorative:wght@400;700;900&family=Cinzel:wght@400;600;700&family=Nunito:wght@400;600;700;800&display=swap" rel="stylesheet">
  <style>
    :root{--red-dark:#8a0000;--amber:#ffaa00;--purple:#6600cc;--purple-light:#9933ff;--black-card:#1e2a50;--text-light:#ffffff;--text-muted:#b8d0f0;--shadow-3d:4px 4px 0px #000,6px 6px 0px rgba(0,0,0,0.4);--gold:#d4a843;--gold-light:#f0d080;}
    *{box-sizing:border-box;margin:0;padding:0;}
    body{font-family:'Nunito',sans-serif;background-color:#0d0d24;color:var(--text-light);overflow-x:hidden;min-height:100vh;display:flex;flex-direction:column;}

    /* Stars */
    .stars{position:fixed;inset:0;pointer-events:none;z-index:0;}
    .star{position:absolute;background:white;border-radius:50%;animation:twinkle var(--d,3s) var(--delay,0s) infinite;}
    @keyframes twinkle{0%,100%{opacity:0.15;}50%{opacity:0.7;}}

    /* Mystic ambient glow */
    .ambient{position:fixed;inset:0;pointer-events:none;z-index:0;}
    .ambient::before{content:'';position:absolute;top:20%;left:50%;transform:translateX(-50%);width:600px;height:600px;background:radial-gradient(circle,rgba(102,0,204,0.08),transparent 70%);animation:ambientPulse 8s ease-in-out infinite alternate;}
    .ambient::after{content:'';position:absolute;bottom:10%;left:50%;transform:translateX(-50%);width:400px;height:400px;background:radial-gradient(circle,rgba(212,168,67,0.06),transparent 70%);animation:ambientPulse 6s ease-in-out 2s infinite alternate;}
    @keyframes ambientPulse{0%{opacity:0.5;transform:translateX(-50%) scale(0.9);}100%{opacity:1;transform:translateX(-50%) scale(1.1);}}
main{flex:1;position:relative;z-index:1;max-width:1000px;margin:0 auto;width:100%;padding:30px 20px;text-align:center;display:flex;flex-direction:column;align-items:center;}
    

    /* Title */
    .page-title{font-family:'Cinzel Decorative',serif;font-size:2.2rem;color:var(--amber);text-align:center;margin-bottom:4px;text-shadow:3px 3px 0 var(--red-dark),0 0 30px rgba(255,170,0,0.3);letter-spacing:2px;}
    .page-subtitle{text-align:center;color:var(--text-muted);font-size:0.95rem;margin-bottom:8px;font-style:italic;}

    /* Reading type selector */
    .reading-select{display:flex;justify-content:center;gap:12px;margin-bottom:28px;flex-wrap:wrap;}
    .reading-btn{background:linear-gradient(145deg,var(--black-card),#162040);border:2px solid rgba(80,140,255,0.3);border-radius:14px;padding:10px 20px;color:var(--text-muted);font-family:'Cinzel',serif;font-size:0.8rem;cursor:pointer;transition:all 0.2s;box-shadow:var(--shadow-3d);}
    .reading-btn:hover{border-color:var(--amber);color:var(--amber);}
    .reading-btn.active{border-color:var(--amber);color:var(--amber);background:linear-gradient(145deg,#2a1a40,#1a1040);box-shadow:0 0 20px rgba(255,170,0,0.15),var(--shadow-3d);}

    /* Instruction */
    .instruction{text-align:center;color:var(--gold);font-family:'Cinzel',serif;font-size:1rem;margin-bottom:20px;min-height:28px;text-shadow:0 0 15px rgba(212,168,67,0.3);}

    /* Spread labels */
    .spread-labels{display:flex;justify-content:center;gap:40px;margin-bottom:10px;flex-wrap:wrap;}
    .spread-label{font-family:'Cinzel',serif;font-size:0.75rem;color:var(--purple-light);text-transform:uppercase;letter-spacing:2px;width:130px;text-align:center;opacity:0;transition:opacity 0.5s;}
    .spread-label.show{opacity:1;}

    /* Card fan / spread area */
    .spread-area{display:flex;justify-content:center;gap:24px;margin-bottom:28px;flex-wrap:wrap;min-height:220px;align-items:center;perspective:800px;}

    /* The deck */
    .deck-area{display:flex;justify-content:center;margin-bottom:28px;perspective:800px;}
    .deck-stack{position:relative;width:130px;height:190px;cursor:pointer;transition:transform 0.2s;}
    .deck-stack:hover{transform:translateY(-4px);}
    .deck-card{position:absolute;width:130px;height:190px;border-radius:14px;border:2px solid rgba(80,140,255,0.35);background:linear-gradient(145deg,#1a2050,#141840);box-shadow:2px 2px 0 #000;transition:all 0.3s;}
    .deck-card:nth-child(1){top:0;left:0;}
    .deck-card:nth-child(2){top:-2px;left:2px;}
    .deck-card:nth-child(3){top:-4px;left:4px;}
    .deck-card-face{width:100%;height:100%;display:flex;flex-direction:column;align-items:center;justify-content:center;position:relative;overflow:hidden;border-radius:12px;}
    .deck-card-face::before{content:'';position:absolute;inset:8px;border:1px solid rgba(212,168,67,0.2);border-radius:8px;}
    .deck-card-face::after{content:'✦';position:absolute;top:50%;left:50%;transform:translate(-50%,-50%);font-size:2.5rem;color:rgba(212,168,67,0.15);}
    .deck-pattern{position:absolute;inset:0;background:repeating-conic-gradient(rgba(102,0,204,0.05) 0% 25%,transparent 0% 50%) 50% / 20px 20px;border-radius:12px;}
    .deck-label{position:absolute;bottom:-28px;font-family:'Cinzel',serif;font-size:0.7rem;color:var(--text-muted);white-space:nowrap;}

    /* Tarot card (in spread) */
    .tarot-card{width:130px;height:190px;border-radius:14px;cursor:pointer;transition:all 0.4s cubic-bezier(0.34,1.56,0.64,1);position:relative;transform-style:preserve-3d;}
    .tarot-card:hover:not(.flipped){transform:translateY(-8px);box-shadow:0 12px 30px rgba(102,0,204,0.3);}
    .tarot-card.flipped{cursor:default;animation:none;}
    .tarot-card.dealing{animation:dealIn 0.5s cubic-bezier(0.34,1.56,0.64,1) forwards;opacity:0;}
    @keyframes dealIn{0%{opacity:0;transform:translateY(-40px) scale(0.8) rotateZ(-5deg);}100%{opacity:1;transform:translateY(0) scale(1) rotateZ(0);}}

    .card-inner{width:100%;height:100%;position:relative;transform-style:preserve-3d;transition:transform 0.6s cubic-bezier(0.34,1.56,0.64,1);}
    .tarot-card.flipped .card-inner{transform:rotateY(180deg);}

    .card-front,.card-back{position:absolute;inset:0;border-radius:14px;backface-visibility:hidden;overflow:hidden;}

    /* Card back */
    .card-back{background:linear-gradient(145deg,#1a2050,#141840);border:2px solid rgba(80,140,255,0.4);display:flex;align-items:center;justify-content:center;box-shadow:var(--shadow-3d);}
    .card-back::before{content:'';position:absolute;inset:8px;border:1px solid rgba(212,168,67,0.25);border-radius:8px;}
    .card-back-inner{display:flex;flex-direction:column;align-items:center;gap:4px;}
    .card-back-symbol{font-size:2.2rem;opacity:0.4;animation:cardGlow 3s ease-in-out infinite alternate;}
    .card-back-dots{font-size:0.6rem;color:rgba(212,168,67,0.3);letter-spacing:4px;}
    @keyframes cardGlow{0%{opacity:0.3;filter:drop-shadow(0 0 0 transparent);}100%{opacity:0.5;filter:drop-shadow(0 0 8px rgba(212,168,67,0.3));}}
    .card-back .deck-pattern{position:absolute;inset:0;background:repeating-conic-gradient(rgba(102,0,204,0.04) 0% 25%,transparent 0% 50%) 50% / 16px 16px;border-radius:12px;}

    /* Card face (revealed) */
    .card-face{background:linear-gradient(180deg,#1a1040,#0d0820);border:2px solid var(--gold);transform:rotateY(180deg);display:flex;flex-direction:column;align-items:center;padding:10px 8px;box-shadow:0 0 25px rgba(212,168,67,0.2),var(--shadow-3d);}
    .card-face::before{content:'';position:absolute;inset:6px;border:1px solid rgba(212,168,67,0.3);border-radius:8px;pointer-events:none;}
    .card-numeral{font-family:'Cinzel',serif;font-size:0.6rem;color:var(--gold);letter-spacing:2px;margin-bottom:2px;}
    .card-emoji{font-size:2.8rem;margin:6px 0;filter:drop-shadow(0 0 10px rgba(212,168,67,0.4));}
    .card-title{font-family:'Cinzel Decorative',serif;font-size:0.7rem;color:var(--gold);text-align:center;line-height:1.2;text-shadow:0 0 10px rgba(212,168,67,0.3);}
    .card-keywords{font-size:0.55rem;color:var(--purple-light);font-style:italic;text-align:center;margin-top:auto;line-height:1.3;padding:0 4px;}
    .card-face-glow{position:absolute;top:0;left:50%;transform:translateX(-50%);width:80px;height:80px;background:radial-gradient(circle,rgba(212,168,67,0.15),transparent);pointer-events:none;}

    /* Reading result */
    .reading-result{max-width:700px;margin:0 auto;width:100%;}
    .reading-card-detail{background:linear-gradient(145deg,var(--black-card),#162040);border:2px solid rgba(80,140,255,0.25);border-radius:18px;padding:22px;margin-bottom:14px;box-shadow:var(--shadow-3d);animation:slideUp 0.5s cubic-bezier(0.34,1.56,0.64,1);position:relative;overflow:hidden;}
    .reading-card-detail::before{content:'';position:absolute;top:0;left:0;right:0;height:2px;background:linear-gradient(90deg,transparent,var(--gold),transparent);}
    @keyframes slideUp{0%{transform:translateY(20px);opacity:0;}100%{transform:translateY(0);opacity:1;}}
    .rcd-header{display:flex;align-items:center;gap:12px;margin-bottom:10px;}
    .rcd-position{font-family:'Cinzel',serif;font-size:0.7rem;color:var(--purple-light);text-transform:uppercase;letter-spacing:2px;}
    .rcd-emoji{font-size:1.8rem;}
    .rcd-name{font-family:'Cinzel Decorative',serif;font-size:1.1rem;color:var(--amber);text-shadow:1px 1px 0 var(--red-dark);}
    .rcd-meaning{color:var(--text-muted);font-size:0.9rem;line-height:1.7;font-weight:600;}
    .rcd-advice{color:var(--gold-light);font-style:italic;font-size:0.85rem;margin-top:8px;padding-left:12px;border-left:2px solid rgba(212,168,67,0.3);}

    /* Summary */
    .reading-summary{background:linear-gradient(145deg,#2a1a40,#1a1040);border:2px solid rgba(212,168,67,0.3);border-radius:18px;padding:24px;margin-bottom:20px;box-shadow:0 0 30px rgba(212,168,67,0.1),var(--shadow-3d);animation:slideUp 0.5s 0.3s both;text-align:center;}
    .reading-summary h3{font-family:'Cinzel Decorative',serif;font-size:1.2rem;color:var(--amber);margin-bottom:10px;text-shadow:2px 2px 0 var(--red-dark);}
    .reading-summary p{color:var(--text-light);font-size:0.95rem;line-height:1.7;font-weight:600;}

    /* Buttons */
    .btn-row{display:flex;justify-content:center;gap:14px;flex-wrap:wrap;margin-top:16px;}
    .btn-back{display:inline-flex;align-items:center;gap:8px;background:linear-gradient(135deg,#3a6fd8,#1a3a9a);color:white;padding:12px 28px;border-radius:12px;text-decoration:none;font-weight:800;font-family:'Cinzel',serif;font-size:1rem;border:2px solid rgba(80,140,255,0.4);box-shadow:var(--shadow-3d);transition:all 0.15s cubic-bezier(0.34,1.56,0.64,1);}
    .btn-back:hover{transform:translate(-3px,-3px);box-shadow:6px 6px 0 #000;}
    .btn-again{display:inline-flex;align-items:center;gap:8px;background:linear-gradient(135deg,var(--purple),#440088);color:var(--amber);padding:12px 28px;border-radius:12px;text-decoration:none;font-weight:800;font-family:'Cinzel',serif;font-size:1rem;border:2px solid var(--purple-light);box-shadow:var(--shadow-3d);transition:all 0.15s cubic-bezier(0.34,1.56,0.64,1);cursor:pointer;}
    .btn-again:hover{transform:translate(-3px,-3px);box-shadow:6px 6px 0 #000;}

    /* Character */
    .mystic-character{text-align:center;margin-bottom:20px;animation:floatChar 4s ease-in-out infinite alternate;}
    @keyframes floatChar{0%{transform:translateY(0);}100%{transform:translateY(-8px);}}
    .mystic-emoji{font-size:3rem;filter:drop-shadow(0 0 15px rgba(153,51,255,0.4));}
    .mystic-name{font-family:'Cinzel',serif;font-size:0.8rem;color:var(--purple-light);margin-top:4px;letter-spacing:2px;}

    footer{background:linear-gradient(180deg,#0d0d24,#141430);color:var(--text-muted);text-align:center;padding:20px;border-top:2px solid rgba(80,140,255,0.2);position:relative;z-index:1;}

    /* Reveal flash */
    .reveal-flash{position:fixed;inset:0;background:radial-gradient(circle,rgba(212,168,67,0.3),transparent 60%);pointer-events:none;z-index:100;animation:flashPulse 0.6s ease-out forwards;}
    @keyframes flashPulse{0%{opacity:1;}100%{opacity:0;}}

    @media(max-width:600px){
      .page-title{font-size:1.6rem;}
      .tarot-card{width:100px;height:150px;}
      .card-emoji{font-size:2rem;}
      .card-title{font-size:0.6rem;}
      .spread-area{gap:12px;}
      .spread-labels{gap:16px;}
      .spread-label{width:100px;font-size:0.65rem;}
    }
  </style>
</head>
<body>

<div class="stars" id="stars"></div>
<div class="ambient"></div>

<main>
  <div class="mystic-character">
    <div class="mystic-emoji">🔮</div>
    <div class="mystic-name">Madame Katherina</div>
  </div>

  <h1>🔮 Mystic Tarot Reading</h1>
  <p class="page-subtitle">The cards know what the heart cannot speak...</p>

  <!-- Reading type -->
  <div class="reading-select">
    <button class="reading-btn active" onclick="setReading('single')" id="btnSingle">✦ Single Card</button>
    <button class="reading-btn" onclick="setReading('past')" id="btnPast">✦✦✦ Past · Present · Future</button>
    <button class="reading-btn" onclick="setReading('mind')" id="btnMind">✦✦✦ Mind · Body · Spirit</button>
  </div>

  <div class="instruction" id="instruction">Tap the deck to draw your card...</div>

  <!-- Deck -->
  <div class="deck-area" id="deckArea">
    <div class="deck-stack" onclick="drawCards()" id="deckStack">
      <div class="deck-card"><div class="deck-card-face"><div class="deck-pattern"></div></div></div>
      <div class="deck-card"><div class="deck-card-face"><div class="deck-pattern"></div></div></div>
      <div class="deck-card"><div class="deck-card-face"><div class="deck-pattern"></div></div></div>
      <div class="deck-label">Tap to draw</div>
    </div>
  </div>

  <!-- Spread labels -->
  <div class="spread-labels" id="spreadLabels"></div>

  <!-- Spread area -->
  <div class="spread-area" id="spreadArea"></div>

  <!-- Reading result -->
  <div class="reading-result" id="readingResult"></div>

  <!-- Buttons -->
  <div class="btn-row" id="btnRow">
    <a href="inside.html" class="btn-back">🔙 Back to Café</a>
  </div>
</main>

<footer>&copy; 2025 Mouse's Enchanted Adventures – Mystic Tarot</footer>

    advice:"Take a moment to feel proud. You've accomplished more than you realize. Then dream bigger.",
    summary:"celebrate your completeness"
  },
];

// ===== STATE =====
let readingType = 'single'; // single, past, mind
let drawnCards = [];
let revealedCount = 0;
let totalToDraw = 1;
let drawn = false;

const POSITIONS = {
  single: ['Your Card'],
  past: ['Past','Present','Future'],
  mind: ['Mind','Body','Spirit'],
};

// ===== INIT =====
function init() {
  const sc = document.getElementById('stars');
  for (let i = 0; i < 80; i++) {
    const s = document.createElement('div');
    s.className = 'star';
    const sz = Math.random() * 2 + 0.5;
    s.style.cssText = `width:${sz}px;height:${sz}px;left:${Math.random()*100}%;top:${Math.random()*100}%;--d:${Math.random()*4+2}s;--delay:${Math.random()*5}s;`;
    sc.appendChild(s);
  }
}

function setReading(type) {
  if (drawn) return;
  readingType = type;
  totalToDraw = type === 'single' ? 1 : 3;
  document.querySelectorAll('.reading-btn').forEach(b => b.classList.remove('active'));
  document.getElementById('btn' + type.charAt(0).toUpperCase() + type.slice(1)).classList.add('active');
  document.getElementById('instruction').textContent = totalToDraw === 1
    ? 'Tap the deck to draw your card...'
    : 'Tap the deck to draw your three cards...';
}

function shuffle(arr) {
  const a = [...arr];
  for (let i = a.length - 1; i > 0; i--) {
    const j = Math.floor(Math.random() * (i + 1));
    [a[i], a[j]] = [a[j], a[i]];
  }
  return a;
}

function drawCards() {
  if (drawn) return;
  drawn = true;
  drawnCards = shuffle(ARCANA).slice(0, totalToDraw);
  revealedCount = 0;

  // Hide deck
  document.getElementById('deckArea').style.display = 'none';

  // Show spread labels
  const labels = POSITIONS[readingType];
  const labelsEl = document.getElementById('spreadLabels');
  labelsEl.innerHTML = labels.map(l => `<div class="spread-label" id="label_${l}">${l}</div>`).join('');

  // Show cards face-down in spread
  const spread = document.getElementById('spreadArea');
  spread.innerHTML = '';

  drawnCards.forEach((card, i) => {
    const el = document.createElement('div');
    el.className = 'tarot-card dealing';
    el.style.animationDelay = `${i * 0.2}s`;
    el.id = 'tcard_' + i;
    el.onclick = () => revealCard(i);
    el.innerHTML = `
      <div class="card-inner">
        <div class="card-back">
          <div class="deck-pattern"></div>
          <div class="card-back-inner">
            <div class="card-back-symbol">✦</div>
            <div class="card-back-dots">· · ·</div>
          </div>
        </div>
        <div class="card-face">
          <div class="card-face-glow"></div>
          <div class="card-numeral">${card.numeral}</div>
          <div class="card-emoji">${card.emoji}</div>
          <div class="card-title">${card.name}</div>
          <div class="card-keywords">${card.keywords}</div>
        </div>
      </div>
    `;
    spread.appendChild(el);
  });

  // Show labels after dealing
  setTimeout(() => {
    document.querySelectorAll('.spread-label').forEach((l, i) => {
      setTimeout(() => l.classList.add('show'), i * 200);
    });
  }, drawnCards.length * 200 + 300);

  // Update instruction
  document.getElementById('instruction').textContent = totalToDraw === 1
    ? 'Tap your card to reveal its message...'
    : 'Tap each card to reveal its message...';
}

function revealCard(index) {
  const el = document.getElementById('tcard_' + index);
  if (el.classList.contains('flipped')) return;

  el.classList.add('flipped');
  revealedCount++;

  // Flash effect
  const flash = document.createElement('div');
  flash.className = 'reveal-flash';
  document.body.appendChild(flash);
  setTimeout(() => flash.remove(), 600);

  // Show reading detail
  const card = drawnCards[index];
  const positions = POSITIONS[readingType];
  const result = document.getElementById('readingResult');

  const detail = document.createElement('div');
  detail.className = 'reading-card-detail';
  detail.style.animationDelay = '0.3s';
  detail.innerHTML = `
    <div class="rcd-header">
      <div class="rcd-position">${positions[index]}</div>
      <div class="rcd-emoji">${card.emoji}</div>
      <div class="rcd-name">${card.name}</div>
    </div>
    <div class="rcd-meaning">${card.meaning}</div>
    <div class="rcd-advice">💫 ${card.advice}</div>
  `;
  result.appendChild(detail);

  // Update instruction
  if (revealedCount < totalToDraw) {
    const remaining = totalToDraw - revealedCount;
    document.getElementById('instruction').textContent = `${remaining} more card${remaining > 1 ? 's' : ''} to reveal...`;
  } else {
    document.getElementById('instruction').textContent = '';

    // Show summary for 3-card readings
    if (totalToDraw === 3) {
      setTimeout(() => {
        const summaries = drawnCards.map((c, i) => `${positions[i]}: ${c.summary}`);
        const summaryEl = document.createElement('div');
        summaryEl.className = 'reading-summary';
        summaryEl.innerHTML = `
          <h3>✨ Your Reading ✨</h3>
          <p>The cards tell you to <strong>${summaries[0]}</strong>, <strong>${summaries[1]}</strong>, and <strong>${summaries[2]}</strong>. Trust the journey — the universe has a plan for you.</p>
        `;
        result.appendChild(summaryEl);
      }, 500);
    }

    // Show new reading button
    setTimeout(() => {
      const btnRow = document.getElementById('btnRow');
      const againBtn = document.createElement('button');
      againBtn.className = 'btn-again';
      againBtn.textContent = '🔮 New Reading';
      againBtn.onclick = resetReading;
      btnRow.insertBefore(againBtn, btnRow.firstChild);
    }, 800);
  }

  // Scroll to result
  setTimeout(() => detail.scrollIntoView({ behavior: 'smooth', block: 'nearest' }), 400);
}

function resetReading() {
  drawn = false;
  drawnCards = [];
  revealedCount = 0;
  document.getElementById('deckArea').style.display = '';
  document.getElementById('spreadArea').innerHTML = '';
  document.getElementById('spreadLabels').innerHTML = '';
  document.getElementById('readingResult').innerHTML = '';
  document.getElementById('instruction').textContent = totalToDraw === 1
    ? 'Tap the deck to draw your card...'
    : 'Tap the deck to draw your three cards...';
  // Remove new reading button
  const old = document.querySelector('.btn-again');
  if (old) old.remove();
}

init();
</script>
</body>
</html>
