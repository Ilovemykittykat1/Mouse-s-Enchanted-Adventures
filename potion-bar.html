<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Potion Bar – Mix Your Magic</title>
  <link href="https://fonts.googleapis.com/css2?family=Cinzel+Decorative:wght@400;700;900&family=Cinzel:wght@400;600;700&family=Nunito:wght@400;600;700;800&display=swap" rel="stylesheet">
  <style>
    :root{--red-dark:#8a0000;--amber:#ffaa00;--purple:#6600cc;--purple-light:#9933ff;--black-card:#1e2a50;--text-light:#ffffff;--text-muted:#b8d0f0;--shadow-3d:4px 4px 0px #000,6px 6px 0px rgba(0,0,0,0.4);}
    *{box-sizing:border-box;margin:0;padding:0;}
    body{font-family:'Nunito',sans-serif;background-color:#1a1a3e;color:var(--text-light);overflow-x:hidden;min-height:100vh;display:flex;flex-direction:column;}
    .stars{position:fixed;inset:0;pointer-events:none;z-index:0;}
    .star{position:absolute;background:white;border-radius:50%;animation:twinkle var(--d,3s) var(--delay,0s) infinite;}
    @keyframes twinkle{0%,100%{opacity:0.2;}50%{opacity:0.8;}}
    main{flex:1;display:flex;flex-direction:column;align-items:center;padding:30px 20px 20px;position:relative;z-index:1;max-width:900px;margin:0 auto;width:100%;}
    h1{font-family:'Cinzel Decorative',serif;font-size:2.2rem;color:var(--amber);text-shadow:3px 3px 0 var(--red-dark),0 0 30px rgba(255,170,0,0.4);margin-bottom:6px;text-align:center;letter-spacing:1px;}
    .page-subtitle{text-align:center;color:var(--text-muted);font-size:0.95rem;margin-bottom:20px;font-style:italic;}
    .top-bar{display:flex;justify-content:space-between;align-items:center;width:100%;margin-bottom:16px;gap:12px;flex-wrap:wrap;}
    .level-badge{display:flex;align-items:center;gap:8px;background:linear-gradient(145deg,var(--black-card),#162040);border:2px solid rgba(80,140,255,0.3);border-radius:14px;padding:8px 16px;font-family:'Cinzel',serif;font-size:0.85rem;color:var(--amber);text-shadow:1px 1px 0 var(--red-dark);box-shadow:var(--shadow-3d);}
    .level-badge .lvl-emoji{font-size:1.4rem;}
    .book-btn{background:linear-gradient(145deg,var(--black-card),#162040);border:2px solid rgba(80,140,255,0.3);border-radius:14px;padding:8px 16px;color:var(--amber);font-family:'Cinzel',serif;font-size:0.85rem;cursor:pointer;transition:all 0.2s;text-shadow:1px 1px 0 var(--red-dark);box-shadow:var(--shadow-3d);}
    .book-btn:hover{border-color:var(--amber);box-shadow:0 0 15px rgba(255,170,0,0.2),var(--shadow-3d);}
    .book-btn .count{color:var(--purple-light);font-weight:800;}
    .brew-area{display:flex;flex-direction:column;align-items:center;gap:12px;margin-bottom:16px;width:100%;}
    .cauldron-wrap{position:relative;width:260px;height:240px;margin:0 auto;}
    .cauldron-glow{position:absolute;bottom:8px;left:50%;transform:translateX(-50%);width:180px;height:36px;border-radius:50%;background:radial-gradient(ellipse,rgba(153,51,255,0.35),transparent);animation:glowPulse 2s ease-in-out infinite alternate;}
    .cauldron-glow.brewing{background:radial-gradient(ellipse,rgba(153,51,255,0.7),transparent);animation:glowPulse 0.4s ease-in-out infinite alternate;}
    @keyframes glowPulse{0%{opacity:0.5;transform:translateX(-50%) scale(0.95);}100%{opacity:1;transform:translateX(-50%) scale(1.05);}}
    .cauldron-body{position:absolute;bottom:28px;left:50%;transform:translateX(-50%);width:200px;height:145px;background:linear-gradient(180deg,#2a2a3a,#18182a 40%,#0d0d1a);border-radius:0 0 50% 50%;border:4px solid #3a3a5a;border-top:none;overflow:hidden;}
    .cauldron-liquid{position:absolute;top:18px;left:5%;right:5%;bottom:0;background:linear-gradient(180deg,rgba(102,0,204,0.4),#0d0d1a);border-radius:0 0 50% 50%;transition:background 0.5s;}
    .cauldron-liquid.has-items{background:linear-gradient(180deg,rgba(153,51,255,0.6),#1a0a2a);}
    .cauldron-liquid.brewing-liq{animation:liquidBubble 0.3s ease-in-out infinite alternate;}
    @keyframes liquidBubble{0%{transform:scaleY(1);}100%{transform:scaleY(1.03);}}
    .bubble{position:absolute;border-radius:50%;background:radial-gradient(circle,rgba(153,51,255,0.4),rgba(153,51,255,0.1));border:1px solid rgba(153,51,255,0.3);animation:bubbleRise var(--dur,2s) ease-in-out var(--del,0s) infinite;}
    @keyframes bubbleRise{0%{transform:translateY(0) scale(1);opacity:0.6;}50%{opacity:0.9;}100%{transform:translateY(-55px) scale(0.3);opacity:0;}}
    .cauldron-rim{position:absolute;bottom:155px;left:50%;transform:translateX(-50%);width:220px;height:26px;background:linear-gradient(180deg,#4a4a6a,#2a2a4a);border-radius:10px 10px 0 0;border:3px solid #5a5a7a;border-bottom:none;}
    .cauldron-handle{position:absolute;bottom:90px;width:26px;height:44px;border:5px solid #4a4a6a;}
    .cauldron-handle.left{left:4px;border-radius:14px 0 0 14px;border-right:none;}
    .cauldron-handle.right{right:4px;border-radius:0 14px 14px 0;border-left:none;}
    .cauldron-leg{position:absolute;bottom:0;width:14px;height:30px;background:linear-gradient(180deg,#2a2a4a,#1a1a3a);border-radius:0 0 5px 5px;}
    .cauldron-leg.l1{left:calc(50% - 54px);}
    .cauldron-leg.l2{left:calc(50% - 7px);}
    .cauldron-leg.l3{left:calc(50% + 40px);}
    .floating-ingredient{position:absolute;font-size:22px;animation:ingFloat 2s ease-in-out var(--del,0s) infinite alternate;filter:drop-shadow(0 0 4px rgba(153,51,255,0.5));}
    @keyframes ingFloat{0%{transform:translateY(0) rotate(-3deg);}100%{transform:translateY(-7px) rotate(3deg);}}
    .steam{position:absolute;font-size:18px;opacity:0.5;animation:steamRise var(--dur,1.8s) ease-out var(--del,0s) infinite;}
    @keyframes steamRise{0%{transform:translateY(0) scale(1);opacity:0.5;}100%{transform:translateY(-35px) scale(1.4);opacity:0;}}
    .selected-chips{display:flex;gap:8px;align-items:center;min-height:32px;flex-wrap:wrap;justify-content:center;}
    .selected-chips .hint{color:#5566aa;font-size:0.8rem;font-style:italic;}
    .chip{background:rgba(102,0,204,0.15);border:1px solid rgba(153,51,255,0.4);border-radius:10px;padding:3px 10px;font-size:0.8rem;color:var(--purple-light);display:flex;align-items:center;gap:4px;}
    .brew-buttons{display:flex;gap:12px;justify-content:center;flex-wrap:wrap;}
    .btn-brew{background:linear-gradient(135deg,var(--purple),#440088);border:2px solid var(--purple-light);color:var(--amber);padding:12px 32px;border-radius:25px;font-size:1rem;font-family:'Cinzel',serif;cursor:pointer;letter-spacing:1px;box-shadow:0 0 20px rgba(102,0,204,0.3),var(--shadow-3d);transition:all 0.2s;}
    .btn-brew:hover:not(:disabled){transform:translate(-2px,-2px) scale(1.05);box-shadow:0 0 35px rgba(102,0,204,0.5),6px 6px 0 #000;}
    .btn-brew:disabled{opacity:0.4;cursor:not-allowed;}
    .btn-back{display:inline-flex;align-items:center;gap:8px;background:linear-gradient(135deg,#3a6fd8,#1a3a9a);color:white;padding:12px 28px;border-radius:12px;text-decoration:none;font-weight:800;font-family:'Cinzel',serif;font-size:1rem;border:2px solid rgba(80,140,255,0.4);box-shadow:var(--shadow-3d);transition:all 0.15s cubic-bezier(0.34,1.56,0.64,1);margin-top:24px;}
    .btn-back:hover{transform:translate(-3px,-3px);box-shadow:6px 6px 0 #000;}
    .ingredients-shelf{background:linear-gradient(145deg,var(--black-card),#162040);border:2px solid rgba(80,140,255,0.3);border-radius:20px;padding:20px 16px;width:100%;box-shadow:var(--shadow-3d);position:relative;overflow:hidden;}
    .ingredients-shelf::before{content:'';position:absolute;top:0;left:0;right:0;height:3px;background:linear-gradient(90deg,transparent,var(--purple-light),var(--amber),transparent);}
    .shelf-title{font-family:'Cinzel',serif;font-size:0.85rem;color:var(--text-muted);text-align:center;margin-bottom:14px;letter-spacing:2px;text-transform:uppercase;}
    .shelf-grid{display:flex;flex-wrap:wrap;justify-content:center;gap:10px;max-width:680px;margin:0 auto;}
    .ingredient-bottle{display:flex;flex-direction:column;align-items:center;gap:3px;cursor:grab;transition:all 0.2s cubic-bezier(0.34,1.56,0.64,1);user-select:none;-webkit-user-select:none;}
    .ingredient-bottle:hover:not(.disabled){transform:scale(1.15) translateY(-5px);}
    .ingredient-bottle.disabled{opacity:0.3;cursor:not-allowed;pointer-events:none;}
    .bottle-body{width:52px;height:64px;background:linear-gradient(180deg,rgba(102,0,204,0.15),rgba(102,0,204,0.05));border:2px solid rgba(153,51,255,0.4);border-radius:8px 8px 14px 14px;display:flex;align-items:center;justify-content:center;font-size:24px;position:relative;transition:all 0.2s;}
    .ingredient-bottle:hover:not(.disabled) .bottle-body{border-color:var(--amber);box-shadow:0 0 14px rgba(255,170,0,0.25);}
    .bottle-cork{position:absolute;top:-7px;left:50%;transform:translateX(-50%);width:22px;height:10px;background:linear-gradient(180deg,#8B6914,#6B4914);border-radius:4px 4px 0 0;}
    .bottle-label{font-size:0.6rem;color:var(--text-muted);text-align:center;max-width:60px;line-height:1.1;font-weight:600;}
    .particles-overlay{position:fixed;inset:0;pointer-events:none;z-index:500;overflow:hidden;}
    .particle{position:absolute;animation:particleFly var(--dur,2s) ease-out var(--del,0s) forwards;}
    @keyframes particleFly{0%{transform:translateY(0) translateX(0) scale(1);opacity:1;}100%{transform:translateY(var(--dy,-40px)) translateX(var(--dx,10px)) scale(0.3);opacity:0;}}
    .char-reaction{position:fixed;bottom:20px;left:50%;transform:translateX(-50%);background:linear-gradient(145deg,#1e2a50ee,#162040ee);border:2px solid rgba(80,140,255,0.4);border-radius:20px;padding:12px 20px;display:flex;align-items:center;gap:12px;z-index:600;animation:slideUpFixed 0.4s cubic-bezier(0.34,1.56,0.64,1);max-width:90%;box-shadow:var(--shadow-3d);}
    @keyframes slideUpFixed{0%{transform:translateX(-50%) translateY(30px);opacity:0;}100%{transform:translateX(-50%) translateY(0);opacity:1;}}
    .char-reaction .char-emoji{font-size:2rem;}
    .char-reaction .char-name{font-size:0.7rem;color:var(--purple-light);font-family:'Cinzel',serif;font-weight:700;}
    .char-reaction .char-says{font-size:0.85rem;color:var(--text-light);font-style:italic;}
    .levelup-overlay{position:fixed;inset:0;background:rgba(0,0,0,0.75);display:flex;align-items:center;justify-content:center;z-index:700;animation:fadeIn 0.5s ease;}
    @keyframes fadeIn{0%{opacity:0;}100%{opacity:1;}}
    @keyframes slideUp{0%{transform:translateY(20px);opacity:0;}100%{transform:translateY(0);opacity:1;}}
    .levelup-card{background:linear-gradient(145deg,var(--black-card),#162040);border:3px solid var(--amber);border-radius:24px;padding:36px 44px;text-align:center;animation:slideUp 0.5s cubic-bezier(0.34,1.56,0.64,1);box-shadow:0 0 60px rgba(255,170,0,0.25),var(--shadow-3d);}
    .levelup-card .lu-emoji{font-size:3rem;margin-bottom:10px;}
    .levelup-card .lu-label{font-family:'Cinzel',serif;font-size:0.85rem;color:var(--purple-light);letter-spacing:3px;margin-bottom:6px;}
    .levelup-card .lu-title{font-family:'Cinzel Decorative',serif;font-size:1.8rem;color:var(--amber);text-shadow:2px 2px 0 var(--red-dark),0 0 20px rgba(255,170,0,0.3);}
    .levelup-card .lu-hint{color:var(--text-muted);font-size:0.8rem;font-style:italic;margin-top:14px;}
    .spellbook-overlay{position:fixed;inset:0;background:rgba(0,0,0,0.8);z-index:800;display:flex;align-items:center;justify-content:center;animation:fadeIn 0.3s ease;padding:20px;}
    .spellbook{background:linear-gradient(145deg,#1e2a50,#162040);border:3px solid rgba(80,140,255,0.4);border-radius:24px;padding:28px;max-width:600px;width:100%;max-height:80vh;overflow-y:auto;box-shadow:var(--shadow-3d),0 0 40px rgba(102,0,204,0.2);}
    .spellbook h2{font-family:'Cinzel Decorative',serif;font-size:1.6rem;color:var(--amber);text-align:center;margin-bottom:6px;text-shadow:2px 2px 0 var(--red-dark);}
    .sb-count{text-align:center;color:var(--purple-light);font-size:0.85rem;font-weight:700;margin-bottom:14px;}
    .sb-progress{height:6px;background:#1a1a3e;border-radius:3px;margin-bottom:20px;overflow:hidden;}
    .sb-progress-fill{height:100%;background:linear-gradient(90deg,var(--purple),var(--purple-light));border-radius:3px;transition:width 0.5s;}
    .sb-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(180px,1fr));gap:12px;}
    .spell-card{background:linear-gradient(135deg,#1a1a3e,#12122a);border:2px solid rgba(80,140,255,0.2);border-radius:14px;padding:16px;min-height:110px;display:flex;flex-direction:column;gap:6px;position:relative;overflow:hidden;}
    .spell-card.found{border-color:rgba(153,51,255,0.4);}
    .spell-card.found::before{content:'';position:absolute;top:0;right:0;width:50px;height:50px;background:radial-gradient(circle at top right,rgba(153,51,255,0.15),transparent);}
    .spell-card .sc-name{font-family:'Cinzel',serif;font-size:0.9rem;color:var(--amber);font-weight:700;}
    .spell-card .sc-desc{font-size:0.75rem;color:var(--text-muted);font-style:italic;line-height:1.4;}
    .spell-card .sc-ingredients{display:flex;gap:5px;margin-top:auto;font-size:1.1rem;}
    .spell-card.mystery{align-items:center;justify-content:center;}
    .spell-card.mystery .sc-q{font-size:2.2rem;opacity:0.25;}
    .spell-card.mystery .sc-hint{font-size:0.75rem;color:#445;font-style:italic;}
    .sb-close{display:block;margin:20px auto 0;background:linear-gradient(135deg,var(--purple),#440088);border:2px solid var(--purple-light);color:var(--amber);padding:10px 28px;border-radius:20px;font-family:'Cinzel',serif;font-size:0.9rem;cursor:pointer;transition:all 0.2s;box-shadow:var(--shadow-3d);}
    .sb-close:hover{transform:translate(-2px,-2px);box-shadow:6px 6px 0 #000,0 0 20px rgba(102,0,204,0.3);}
    .result-banner{text-align:center;animation:slideUp 0.5s cubic-bezier(0.34,1.56,0.64,1);margin-bottom:8px;}
    .result-name{font-family:'Cinzel Decorative',serif;font-size:1.6rem;text-shadow:0 0 20px currentColor;font-weight:700;}
    .result-desc{color:var(--text-muted);font-size:0.9rem;font-style:italic;margin-top:4px;}
    .fail-emoji{font-size:2.5rem;}
    .fail-title{font-family:'Cinzel Decorative',serif;font-size:1.2rem;color:var(--amber);margin-top:4px;}
    footer{background:linear-gradient(180deg,#1a2040,#1e2a4a);color:var(--text-muted);text-align:center;padding:20px;border-top:3px solid #3a6fd8;position:relative;z-index:1;}
    @media(max-width:600px){
      h1{font-size:1.6rem;}
      .shelf-grid{gap:6px;}
      .bottle-body{width:44px;height:54px;font-size:20px;}
      .sb-grid{grid-template-columns:1fr;}
      .top-bar{justify-content:center;}
    }
  </style>
</head>
<body>
<div class="stars" id="stars"></div>
<main>
  <h1>🧪 Katherina's Cauldron 🧪</h1>
  <p class="page-subtitle">Drag ingredients into the cauldron and brew magical spells!</p>
  <div class="top-bar">
    <div class="level-badge"><span class="lvl-emoji" id="levelEmoji">🧹</span><span id="levelTitle">Apprentice</span></div>
    <button class="book-btn" onclick="openSpellbook()">📖 Spell Book <span class="count" id="discoveredCount">0/10</span></button>
  </div>
  <div class="result-banner" id="resultBanner" style="display:none;"></div>
  <div class="brew-area">
    <div class="cauldron-wrap" id="cauldronWrap" ondragover="event.preventDefault()" ondrop="handleDrop(event)">
      <div class="cauldron-glow" id="cauldronGlow"></div>
      <div class="cauldron-body">
        <div class="cauldron-liquid" id="cauldronLiquid">
          <div class="bubble" style="bottom:20%;left:25%;width:10px;height:10px;--dur:2.2s;--del:0s;"></div>
          <div class="bubble" style="bottom:35%;left:55%;width:7px;height:7px;--dur:2.8s;--del:0.5s;"></div>
          <div class="bubble" style="bottom:10%;left:70%;width:12px;height:12px;--dur:1.8s;--del:1.2s;"></div>
        </div>
        <div id="floatingIngredients"></div>
      </div>
      <div class="cauldron-rim"></div>
      <div class="cauldron-handle left"></div>
      <div class="cauldron-handle right"></div>
      <div class="cauldron-leg l1"></div>
      <div class="cauldron-leg l2"></div>
      <div class="cauldron-leg l3"></div>
      <div id="steamContainer"></div>
    </div>
    <div class="selected-chips" id="selectedChips"><span class="hint">Tap or drag ingredients to add them...</span></div>
    <div class="brew-buttons" id="brewButtons"><button class="btn-brew" id="btnBrew" disabled onclick="brewPotion()">🔮 Brew Spell</button></div>
  </div>
  <div class="ingredients-shelf">
    <div class="shelf-title">✨ Ingredients ✨</div>
    <div class="shelf-grid" id="shelfGrid"></div>
  </div>
  <a href="inside.html" class="btn-back">🔙 Back to Café</a>
</main>
<footer>&copy; 2025 Mouse's Enchanted Adventures – Potion Bar</footer>
<div class="particles-overlay" id="particlesOverlay"></div>
<div id="charReaction" style="display:none;"></div>
<div id="levelupOverlay" style="display:none;"></div>
<div id="spellbookOverlay" style="display:none;"></div>
<script>
const INGREDIENTS=[{id:"moonwater",name:"Moonwater",emoji:"🌙"},{id:"dragonscale",name:"Dragon Scale",emoji:"🐉"},{id:"pixiedust",name:"Pixie Dust",emoji:"✨"},{id:"frogtears",name:"Frog Tears",emoji:"🐸"},{id:"shadowroot",name:"Shadow Root",emoji:"🌿"},{id:"starlight",name:"Starlight",emoji:"⭐"},{id:"batwing",name:"Bat Wing",emoji:"🦇"},{id:"spidersilk",name:"Spider Silk",emoji:"🕸️"},{id:"mushroom",name:"Enchanted Mushroom",emoji:"🍄"},{id:"phoenix",name:"Phoenix Feather",emoji:"🔥"},{id:"crystal",name:"Crystal Shard",emoji:"💎"},{id:"thornvine",name:"Thorn Vine",emoji:"🌹"}];
const RECIPES=[{ingredients:["moonwater","pixiedust"],name:"Glitter Storm",desc:"A shower of sparkles fills the air!",emojis:["✨","⭐","💫","🌟"],color:"#FFD700"},{ingredients:["dragonscale","phoenix"],name:"Fire Breath",desc:"WHOOOOSH! Flames everywhere!",emojis:["🔥","💥","🔥","💫"],color:"#FF4500"},{ingredients:["shadowroot","batwing"],name:"Invisibility Cloak",desc:"Now you see it... now you don't!",emojis:["👻","💨","🌫️","👻"],color:"#9933ff"},{ingredients:["starlight","crystal"],name:"Light Shield",desc:"A glowing bubble of protection!",emojis:["🛡️","💎","✨","🛡️"],color:"#88D4E8"},{ingredients:["frogtears","mushroom"],name:"Growth Potion",desc:"Everything's getting BIGGER!",emojis:["🌱","🌿","🌳","🍀"],color:"#5BA85B"},{ingredients:["spidersilk","thornvine"],name:"Vine Trap",desc:"Vines crawl everywhere!",emojis:["🌿","🍃","🌱","🪴"],color:"#2D8A27"},{ingredients:["moonwater","shadowroot","starlight"],name:"Fog Spell",desc:"Mysterious mist rolls in...",emojis:["🌫️","💨","☁️","🌫️"],color:"#8899CC"},{ingredients:["dragonscale","crystal","phoenix"],name:"Lightning Bolt",desc:"ZAP! Crackle! BOOM!",emojis:["⚡","💥","⚡","🌩️"],color:"#FFE74C"},{ingredients:["pixiedust","frogtears","mushroom"],name:"Animal Talk",desc:"The animals are chatting away!",emojis:["🐱","🦇","🐸","🦉"],color:"#E8C547"},{ingredients:["batwing","spidersilk","shadowroot"],name:"Zombie Rise",desc:"They're coming... and they're silly!",emojis:["🧟","💀","🖐️","🧟"],color:"#6B8E23"}];
const FAILURES=[{text:"KABOOM! Confetti explosion!",emoji:"🎉"},{text:"The cauldron BURPED!",emoji:"😂"},{text:"A rubber duck popped out!",emoji:"🦆"},{text:"Green slime EVERYWHERE!",emoji:"🟢"},{text:"The cauldron sneezed!",emoji:"🤧"},{text:"It turned into bubbles!",emoji:"🫧"}];
const LEVELS=[{min:0,title:"Apprentice",emoji:"🧹"},{min:3,title:"Journeyman",emoji:"📜"},{min:5,title:"Adept",emoji:"🔮"},{min:8,title:"Master Wizard",emoji:"🧙"}];
let cauldronItems=[],discovered=JSON.parse(localStorage.getItem('mea_discovered')||'[]'),brewing=false,hasResult=false;
function init(){renderShelf();updateLevel();updateCount();const sc=document.getElementById('stars');for(let i=0;i<60;i++){const s=document.createElement('div');s.className='star';const sz=Math.random()*2+0.5;s.style.cssText=`width:${sz}px;height:${sz}px;left:${Math.random()*100}%;top:${Math.random()*100}%;--d:${Math.random()*4+2}s;--delay:${Math.random()*5}s;`;sc.appendChild(s);}}
function renderShelf(){const grid=document.getElementById('shelfGrid');grid.innerHTML='';INGREDIENTS.forEach(ing=>{const inC=cauldronItems.some(i=>i.id===ing.id);const dis=brewing||hasResult||inC||cauldronItems.length>=3;const div=document.createElement('div');div.className='ingredient-bottle'+(dis?' disabled':'');div.draggable=!dis;div.innerHTML=`<div class="bottle-body"><div class="bottle-cork"></div>${ing.emoji}</div><span class="bottle-label">${ing.name}</span>`;if(!dis){div.onclick=()=>addToCauldron(ing);div.ondragstart=e=>{e.dataTransfer.setData('text/plain',ing.id);};}grid.appendChild(div);});}
function renderChips(){const c=document.getElementById('selectedChips');c.innerHTML=cauldronItems.length===0?'<span class="hint">Tap or drag ingredients to add them...</span>':cauldronItems.map(i=>`<span class="chip">${i.emoji} ${i.name}</span>`).join('');}
function renderFloating(){document.getElementById('floatingIngredients').innerHTML=cauldronItems.map((ing,i)=>`<div class="floating-ingredient" style="top:${25+i*15}%;left:${20+i*20}%;--del:${i*0.3}s;">${ing.emoji}</div>`).join('');document.getElementById('cauldronLiquid').className='cauldron-liquid'+(cauldronItems.length>0?' has-items':'');}
function updateBrewButton(){const b=document.getElementById('btnBrew');if(b){b.disabled=cauldronItems.length<2||brewing;b.textContent=brewing?'✨ Brewing...':'🔮 Brew Spell';}}
function updateLevel(){let l=LEVELS[0];for(let i=LEVELS.length-1;i>=0;i--){if(discovered.length>=LEVELS[i].min){l=LEVELS[i];break;}}document.getElementById('levelEmoji').textContent=l.emoji;document.getElementById('levelTitle').textContent=l.title;return l;}
function updateCount(){document.getElementById('discoveredCount').textContent=`${discovered.length}/${RECIPES.length}`;}
function addToCauldron(ing){if(brewing||hasResult||cauldronItems.some(i=>i.id===ing.id)||cauldronItems.length>=3)return;cauldronItems.push(ing);renderShelf();renderChips();renderFloating();updateBrewButton();}
function handleDrop(e){e.preventDefault();const id=e.dataTransfer.getData('text/plain');const ing=INGREDIENTS.find(i=>i.id===id);if(ing)addToCauldron(ing);}
function resetBrew(){cauldronItems=[];hasResult=false;document.getElementById('resultBanner').style.display='none';document.getElementById('particlesOverlay').innerHTML='';document.getElementById('charReaction').style.display='none';document.getElementById('steamContainer').innerHTML='';document.getElementById('cauldronLiquid').classList.remove('brewing-liq');document.getElementById('cauldronGlow').classList.remove('brewing');document.getElementById('brewButtons').innerHTML='<button class="btn-brew" id="btnBrew" disabled onclick="brewPotion()">🔮 Brew Spell</button>';renderShelf();renderChips();renderFloating();updateBrewButton();}
function matchRecipe(ids){const s=[...ids].sort();return RECIPES.find(r=>{const rs=[...r.ingredients].sort();return rs.length===s.length&&rs.every((v,i)=>v===s[i]);});}
function brewPotion(){if(cauldronItems.length<2||brewing)return;brewing=true;updateBrewButton();renderShelf();const liq=document.getElementById('cauldronLiquid');liq.classList.add('brewing-liq');document.getElementById('cauldronGlow').classList.add('brewing');for(let i=0;i<3;i++){const b=document.createElement('div');b.className='bubble';b.style.cssText=`bottom:${Math.random()*50}%;left:${15+Math.random()*70}%;width:${8+Math.random()*12}px;height:${8+Math.random()*12}px;--dur:${0.8+Math.random()}s;--del:${Math.random()*0.5}s;`;liq.appendChild(b);}const stC=document.getElementById('steamContainer');for(let i=0;i<3;i++){const s=document.createElement('div');s.className='steam';s.textContent='💨';s.style.cssText=`top:${-10-i*12}px;left:${35+i*7}%;--dur:${1.3+Math.random()}s;--del:${i*0.25}s;`;stC.appendChild(s);}setTimeout(()=>{brewing=false;hasResult=true;const ids=cauldronItems.map(i=>i.id);const recipe=matchRecipe(ids);if(recipe){showSuccess(recipe);}else{showFailure();}document.getElementById('brewButtons').innerHTML='<button class="btn-brew" onclick="resetBrew()">🧹 Try Again</button>';updateBrewButton();renderShelf();},2200);}
function showSuccess(recipe){const already=discovered.includes(recipe.name);const oldLvl=updateLevel();if(!already){discovered.push(recipe.name);localStorage.setItem('mea_discovered',JSON.stringify(discovered));}updateCount();const newLvl=updateLevel();const b=document.getElementById('resultBanner');b.style.display='block';b.innerHTML=`<div class="result-name" style="color:${recipe.color};">${recipe.name}!</div><div class="result-desc">${recipe.desc}</div>`;spawnParticles(recipe.emojis);if(!already&&newLvl.title!==oldLvl.title){setTimeout(()=>{showLevelUp(newLvl);showReaction('🦇','Bat',`You're now a ${newLvl.title}! Squeak!`);},1200);}else{setTimeout(()=>{showReaction('🧙‍♀️','Katherina',already?"You've brewed this before — still impressive!":`${recipe.name}! Brilliant work!`);},600);}}
function showFailure(){const f=FAILURES[Math.floor(Math.random()*FAILURES.length)];const b=document.getElementById('resultBanner');b.style.display='block';b.innerHTML=`<div class="fail-emoji">${f.emoji}</div><div class="fail-title">Oops!</div><div class="result-desc">${f.text}</div>`;spawnParticles(['💥','🎉','🦆','🫧','😂']);setTimeout(()=>{showReaction('🐱','Mouse',f.text);},600);}
function spawnParticles(emojis){const o=document.getElementById('particlesOverlay');o.innerHTML='';for(let i=0;i<8;i++){const p=document.createElement('div');p.className='particle';p.textContent=emojis[i%emojis.length];p.style.cssText=`left:${30+Math.random()*40}%;top:${30+Math.random()*30}%;font-size:${16+Math.random()*14}px;--dur:${1.5+Math.random()}s;--del:${Math.random()*0.5}s;--dy:${-40-Math.random()*40}px;--dx:${-20+Math.random()*40}px;`;o.appendChild(p);}setTimeout(()=>{o.innerHTML='';},2500);}
function showReaction(emoji,name,text){const el=document.getElementById('charReaction');el.style.display='block';el.innerHTML=`<div class="char-reaction"><span class="char-emoji">${emoji}</span><div><div class="char-name">${name}</div><div class="char-says">"${text}"</div></div></div>`;setTimeout(()=>{el.style.display='none';},4000);}
function showLevelUp(level){const el=document.getElementById('levelupOverlay');el.style.display='block';el.innerHTML=`<div class="levelup-overlay" onclick="closeLevelUp()"><div class="levelup-card"><div class="lu-emoji">${level.emoji}</div><div class="lu-label">LEVEL UP!</div><div class="lu-title">${level.title}</div><div class="lu-hint">Tap to continue</div></div></div>`;}
function closeLevelUp(){document.getElementById('levelupOverlay').style.display='none';}
function openSpellbook(){const el=document.getElementById('spellbookOverlay');el.style.display='block';const pct=(discovered.length/RECIPES.length)*100;let cards=RECIPES.map(r=>{const found=discovered.includes(r.name);if(found){const ings=r.ingredients.map(id=>{const ing=INGREDIENTS.find(i=>i.id===id);return ing?ing.emoji:'?';}).join(' ');return`<div class="spell-card found"><div class="sc-name">${r.name}</div><div class="sc-desc">${r.desc}</div><div class="sc-ingredients">${ings}</div></div>`;}else{return`<div class="spell-card mystery"><div class="sc-q">❓</div><div class="sc-hint">Undiscovered spell...</div></div>`;}}).join('');el.innerHTML=`<div class="spellbook-overlay" onclick="if(event.target===this)closeSpellbook()"><div class="spellbook"><h2>📖 Spell Book</h2><div class="sb-count">${discovered.length} of ${RECIPES.length} spells discovered</div><div class="sb-progress"><div class="sb-progress-fill" style="width:${pct}%"></div></div><div class="sb-grid">${cards}</div><button class="sb-close" onclick="closeSpellbook()">Close Book</button></div></div>`;}
function closeSpellbook(){document.getElementById('spellbookOverlay').style.display='none';}
init();
</script>
</body>
</html>
