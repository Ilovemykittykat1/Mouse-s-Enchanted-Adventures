<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Mouse's Enchanted Adventures — 2026 Calendar</title>
<link href="https://fonts.googleapis.com/css2?family=Cinzel+Decorative:wght@400;700;900&family=Cinzel:wght@400;600;700&family=IM+Fell+English:ital@0;1&display=swap" rel="stylesheet">
<style>
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

:root {
  --navy: #0d0b1e;
  --deep: #140e2a;
  --purple: #2a1560;
  --violet: #4a1e8a;
  --gold: #c9943a;
  --gold-light: #e8c060;
  --red: #8b1a1a;
  --red-bright: #c0392b;
  --mist: #d4c8f0;
  --white: #f5f0ff;
  --grey: #7a6a9a;
}

body {
  background: var(--navy);
  font-family: 'Cinzel', serif;
  color: var(--white);
  min-height: 100vh;
}

/* ── Back button ── */
.back-bar {
  padding: 14px 20px 0;
  position: relative;
  z-index: 10;
}

.btn-back {
  display: inline-flex;
  align-items: center;
  gap: 8px;
  background: none;
  border: 1px solid var(--gold);
  color: var(--gold);
  padding: 8px 18px;
  font-family: 'Cinzel', serif;
  font-size: 13px;
  cursor: pointer;
  border-radius: 4px;
  text-decoration: none;
  letter-spacing: 1px;
  transition: background 0.2s;
}

.btn-back:hover {
  background: rgba(201,148,58,0.15);
}

/* ── Page layout ── */
.calendar-page {
  width: 100%;
  max-width: 1120px;
  margin: 0 auto;
  padding: 24px 16px 48px;
}

/* ── Cover page ── */
.cover {
  width: 100%;
  min-height: 400px;
  background: var(--deep);
  border: 3px solid var(--gold);
  border-radius: 4px;
  display: flex;
  flex-direction: column;
  align-items: center;
  justify-content: center;
  text-align: center;
  padding: 32px 20px;
  margin-bottom: 32px;
  position: relative;
  overflow: hidden;
}

.cover::before {
  content: '';
  position: absolute; inset: 0;
  background:
    radial-gradient(ellipse at 20% 20%, rgba(74,30,138,0.4) 0%, transparent 50%),
    radial-gradient(ellipse at 80% 80%, rgba(139,26,26,0.3) 0%, transparent 50%),
    radial-gradient(ellipse at 50% 50%, rgba(42,21,96,0.6) 0%, transparent 70%);
  pointer-events: none;
}

.cover-stars {
  position: absolute; inset: 0; pointer-events: none;
}

.star {
  position: absolute;
  background: var(--gold-light);
  border-radius: 50%;
  animation: twinkle var(--dur, 3s) ease-in-out infinite;
  animation-delay: var(--delay, 0s);
}

@keyframes twinkle {
  0%, 100% { opacity: 0.2; transform: scale(1); }
  50% { opacity: 1; transform: scale(1.4); }
}

.cover-year {
  font-family: 'Cinzel Decorative', cursive;
  font-size: clamp(48px, 12vw, 96px);
  font-weight: 900;
  color: var(--gold);
  text-shadow: 0 0 40px rgba(201,148,58,0.6), 0 4px 0 #6a3a00;
  letter-spacing: 4px;
  line-height: 1;
  position: relative;
}

.cover-title {
  font-family: 'Cinzel Decorative', cursive;
  font-size: clamp(13px, 3.5vw, 22px);
  font-weight: 700;
  color: var(--white);
  letter-spacing: 2px;
  margin: 12px 0 4px;
  position: relative;
}

.cover-subtitle {
  font-family: 'IM Fell English', serif;
  font-style: italic;
  font-size: clamp(13px, 3vw, 16px);
  color: var(--mist);
  letter-spacing: 1px;
  position: relative;
}

.cover-divider {
  width: min(300px, 80%);
  height: 2px;
  background: linear-gradient(90deg, transparent, var(--gold), transparent);
  margin: 16px auto;
  position: relative;
}

.cover-chars {
  display: flex;
  flex-wrap: wrap;
  gap: 20px;
  margin-top: 20px;
  position: relative;
  justify-content: center;
}

.cover-char {
  display: flex;
  flex-direction: column;
  align-items: center;
  gap: 6px;
}

.cover-char-icon {
  width: 56px; height: 56px;
  border: 2px solid var(--gold);
  border-radius: 50%;
  background: var(--purple);
  display: flex; align-items: center; justify-content: center;
  font-size: 24px;
  box-shadow: 0 0 16px rgba(201,148,58,0.3);
}

.cover-char-name {
  font-size: 11px;
  letter-spacing: 1px;
  color: var(--mist);
  text-transform: uppercase;
}

/* ── Month grid ── */
.months-grid {
  display: grid;
  grid-template-columns: repeat(3, 1fr);
  gap: 16px;
}

@media (max-width: 700px) {
  .months-grid {
    grid-template-columns: 1fr;
  }
}

@media (min-width: 701px) and (max-width: 900px) {
  .months-grid {
    grid-template-columns: repeat(2, 1fr);
  }
}

/* ── Month card ── */
.month-card {
  background: var(--deep);
  border: 2px solid var(--gold);
  border-radius: 4px;
  overflow: hidden;
  box-shadow: 0 4px 24px rgba(0,0,0,0.5), inset 0 0 40px rgba(42,21,96,0.3);
}

.month-art {
  width: 100%;
  height: 140px;
  background: var(--purple);
  position: relative;
  overflow: hidden;
  display: flex;
  align-items: center;
  justify-content: center;
}

.month-art svg {
  position: absolute;
  inset: 0;
  width: 100%;
  height: 100%;
}

.month-art-label {
  position: absolute;
  bottom: 8px;
  right: 10px;
  font-family: 'IM Fell English', serif;
  font-style: italic;
  font-size: 11px;
  color: rgba(212,200,240,0.6);
  letter-spacing: 1px;
}

.month-header {
  padding: 10px 14px 6px;
  border-bottom: 1px solid rgba(201,148,58,0.3);
  display: flex;
  align-items: baseline;
  justify-content: space-between;
}

.month-name {
  font-family: 'Cinzel Decorative', cursive;
  font-size: clamp(14px, 2.5vw, 18px);
  font-weight: 700;
  color: var(--gold);
  text-shadow: 0 0 16px rgba(201,148,58,0.4);
}

.month-emoji {
  font-size: 18px;
}

.cal-days-header {
  display: grid;
  grid-template-columns: repeat(7, 1fr);
  padding: 6px 8px 2px;
  gap: 2px;
}

.cal-day-name {
  text-align: center;
  font-size: 9px;
  font-weight: 600;
  letter-spacing: 0.5px;
  color: var(--gold);
  text-transform: uppercase;
  padding: 2px 0;
}

.cal-grid {
  display: grid;
  grid-template-columns: repeat(7, 1fr);
  gap: 2px;
  padding: 4px 8px 10px;
}

.cal-date {
  text-align: center;
  font-size: 11px;
  padding: 4px 1px;
  border-radius: 3px;
  color: var(--mist);
  line-height: 1;
  font-family: 'Cinzel', serif;
  font-weight: 400;
  cursor: default;
}

.cal-date.empty {
  color: transparent;
}

.cal-date.sunday {
  color: var(--red-bright);
}

.cal-date.holiday {
  background: rgba(201,148,58,0.15);
  color: var(--gold-light);
  font-weight: 700;
  border-radius: 50%;
}

.cal-date.today {
  background: var(--violet);
  color: white;
  font-weight: 700;
  border-radius: 50%;
  box-shadow: 0 0 8px rgba(74,30,138,0.8);
}

.holiday-name {
  font-size: 8px;
  color: var(--gold);
  font-family: 'IM Fell English', serif;
  font-style: italic;
  text-align: center;
  padding: 2px 8px 6px;
  border-top: 1px solid rgba(201,148,58,0.15);
  min-height: 20px;
  line-height: 1.4;
}

/* ── Nav ── */
.cal-nav {
  display: flex;
  align-items: center;
  justify-content: space-between;
  padding: 12px 0 20px;
  gap: 10px;
}

.cal-nav-title {
  font-family: 'Cinzel Decorative', cursive;
  font-size: clamp(11px, 3vw, 14px);
  color: var(--gold);
  letter-spacing: 1px;
  text-align: center;
}

.nav-btn {
  background: none;
  border: 1px solid var(--gold);
  color: var(--gold);
  padding: 8px 14px;
  font-family: 'Cinzel', serif;
  font-size: 12px;
  cursor: pointer;
  border-radius: 2px;
  transition: background 0.2s;
  letter-spacing: 1px;
  white-space: nowrap;
  flex-shrink: 0;
}

.nav-btn:hover {
  background: rgba(201,148,58,0.15);
}

/* ── Footer ── */
.cal-footer {
  text-align: center;
  padding: 28px 0 16px;
  font-family: 'IM Fell English', serif;
  font-style: italic;
  font-size: 13px;
  color: var(--grey);
  letter-spacing: 1px;
  border-top: 1px solid rgba(201,148,58,0.2);
  margin-top: 28px;
}

@media print {
  body { background: white; }
  .calendar-page { width: 100%; padding: 0; }
  .cal-nav, .back-bar { display: none; }
  .months-grid { page-break-inside: avoid; }
  .month-card { border-color: #888; box-shadow: none; }
}
</style>
</head>

const MONTH_THEMES = [
  "Ice & whispered spells",
  "Hearts under moonlight",
  "Enchanted pathways bloom",
  "Storm over the old chapel",
  "Garden of dark flowers",
  "Solstice fires burn bright",
  "Firefly summer nights",
  "Bats fill the cavern sky",
  "Books hide ancient secrets",
  "All Hallows' Eve arrives",
  "Fog shrouds the graveyard",
  "Yule magic in the dark"
];

function buildMonth(monthIdx) {
  const year = 2026;
  const daysInMonth = getDaysInMonth(year, monthIdx);
  const firstDay = getFirstDayOfMonth(year, monthIdx);

  let html = `<div class="month-card">`;
  html += `<div class="month-art">${MONTH_SCENES[monthIdx]}<div class="month-art-label">${MONTH_THEMES[monthIdx]}</div></div>`;
  html += `<div class="month-header"><div class="month-name">${MONTHS[monthIdx]}</div><div class="month-emoji">${MONTH_EMOJIS[monthIdx]}</div></div>`;

  html += `<div class="cal-days-header">`;
  ['Sun','Mon','Tue','Wed','Thu','Fri','Sat'].forEach(d => {
    html += `<div class="cal-day-name">${d}</div>`;
  });
  html += `</div>`;

  html += `<div class="cal-grid">`;
  for (let i = 0; i < firstDay; i++) {
    html += `<div class="cal-date empty"></div>`;
  }

  const monthHolidays = {};
  Object.entries(HOLIDAYS_2026).forEach(([dateStr, name]) => {
    const [hy, hm, hd] = dateStr.split('-').map(Number);
    if (hy === year && hm === monthIdx + 1) {
      monthHolidays[hd] = name;
    }
  });

  for (let d = 1; d <= daysInMonth; d++) {
    const dayOfWeek = (firstDay + d - 1) % 7;
    const dateStr = `${year}-${String(monthIdx+1).padStart(2,'0')}-${String(d).padStart(2,'0')}`;
    const isToday = dateStr === todayStr;
    const isHoliday = monthHolidays[d];
    const isSunday = dayOfWeek === 0;

    let cls = 'cal-date';
    if (isSunday) cls += ' sunday';
    if (isHoliday) cls += ' holiday';
    if (isToday) cls += ' today';

    html += `<div class="${cls}" title="${isHoliday || ''}">${d}</div>`;
  }

  html += `</div>`;

  const monthHolidayList = Object.entries(HOLIDAYS_2026)
    .filter(([ds]) => {
      const [hy, hm] = ds.split('-').map(Number);
      return hy === year && hm === monthIdx + 1;
    })
    .map(([ds, name]) => `${parseInt(ds.split('-')[2])} – ${name}`)
    .join(' · ');

  html += `<div class="holiday-name">${monthHolidayList || ''}</div>`;
  html += `</div>`;
  return html;
}

let currentQuarter = 0;

const quarterLabels = [
  'January – March 2026',
  'April – June 2026',
  'July – September 2026',
  'October – December 2026'
];

function renderQuarter() {
  const grid = document.getElementById('monthsGrid');
  const label = document.getElementById('quarterLabel');
  const start = currentQuarter * 3;
  label.textContent = quarterLabels[currentQuarter];
  document.getElementById('prevBtn').disabled = currentQuarter === 0;
  document.getElementById('nextBtn').disabled = currentQuarter === 3;

  let html = '';
  for (let i = start; i < start + 3; i++) {
    html += buildMonth(i);
  }
  grid.innerHTML = html;
  window.scrollTo({ top: 0, behavior: 'smooth' });
}

document.getElementById('prevBtn').addEventListener('click', () => {
  if (currentQuarter > 0) { currentQuarter--; renderQuarter(); }
});
document.getElementById('nextBtn').addEventListener('click', () => {
  if (currentQuarter < 3) { currentQuarter++; renderQuarter(); }
});

function makeStars() {
  const container = document.getElementById('coverStars');
  for (let i = 0; i < 60; i++) {
    const s = document.createElement('div');
    s.className = 'star';
    const size = Math.random() * 2.5 + 1;
    s.style.cssText = `left:${Math.random()*100}%;top:${Math.random()*100}%;width:${size}px;height:${size}px;--dur:${2+Math.random()*4}s;--delay:${-Math.random()*6}s;`;
    container.appendChild(s);
  }
}

const currentMonth = TODAY.getMonth();
if (currentMonth >= 9) currentQuarter = 3;
else if (currentMonth >= 6) currentQuarter = 2;
else if (currentMonth >= 3) currentQuarter = 1;
else currentQuarter = 0;

makeStars();
renderQuarter();
</script>
