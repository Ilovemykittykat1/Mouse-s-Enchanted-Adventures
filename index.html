<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Mouse's Enchanted Adventures</title>
  <style>
    body {
      background: linear-gradient(to bottom right, #6e2aa3, #1e2a78); /* deep purple to magical indigo */
      color: white;
      font-family: Arial, sans-serif;
      text-align: center;
      padding: 20px;
      border: 10px solid #8e44ad;
      overflow-x: hidden;
      margin: 0;
    }

    header, footer {
      border: 2px solid #8e44ad;
      padding: 10px;
      margin-bottom: 20px;
    }

    h1 {
      margin: 0;
      font-size: 2rem;
    }

    .menu-toggle {
      display: none;
      background: #8e44ad;
      border: none;
      color: white;
      font-size: 1.5rem;
      padding: 10px;
      cursor: pointer;
      margin-top: 10px;
    }

    nav ul {
      list-style-type: none;
      padding: 0;
      background-color: #8e44ad;
      display: flex;
      justify-content: center;
      gap: 20px;
      border: 2px solid #8e44ad;
      margin-top: 10px;
      flex-wrap: wrap;
    }

    nav ul li a {
      color: white;
      text-decoration: none;
      padding: 10px 20px;
      display: inline-block;
      transition: background-color 0.3s, color 0.3s;
    }

    nav ul li a:hover {
      background-color: #5dade2;
      color: black;
    }

    .intro {
      max-width: 800px;
      margin: 40px auto;
      background: linear-gradient(135deg, rgba(142,68,173,0.9), rgba(30,144,255,0.3));
      padding: 30px;
      border-radius: 15px;
      box-shadow: 0 0 25px rgba(142, 68, 173, 0.6);
    }

    .intro h2 {
      color: #ff4d4d;
      margin-bottom: 10px;
    }

    .intro p {
      font-size: 1.2em;
      margin-top: 0;
      margin-bottom: 20px;
    }

    .intro img {
      width: 400px;
      max-width: 100%;
      height: auto;
      margin: 20px auto;
      display: block;
      border-radius: 20px;
      box-shadow: 0 0 15px rgba(255, 255, 255, 0.3);
    }

    footer {
      font-size: 0.9em;
    }

    @media (max-width: 768px) {
      .menu-toggle {
        display: block;
        margin: 0 auto;
      }

      nav ul {
        display: none;
        flex-direction: column;
        align-items: center;
        width: 100%;
      }

      nav ul.show {
        display: flex;
      }

      nav ul li {
        width: 100%;
        text-align: center;
      }

      .intro {
        margin: 20px 10px;
        padding: 20px;
      }

      .intro p {
        font-size: 1.1em;
      }
    }
  </style>
</head>

<body>

  <header>
  <h1>Welcome to Mouse's Enchanted Adventures</h1>
  <button class="menu-toggle" onclick="toggleMenu()">☰ Menu</button> <!-- ✅ Correct spot -->
  <nav>
    <ul id="nav-menu">
      <li><a href="index.html">Home</a></li>
      <li><a href="product.html">Products</a></li>
      <li><a href="contact.html">Contact</a></li>
      <li><a href="about.html">About</a></li>
      <li><a href="cafe-door.html">Enter Café</a></li>
      <li><a href="digital-familiar.html">The Digital Familiar</a></li>
    </ul>
  </nav>
</header>


  <main>
    <section class="intro">
      <h2>Meet Mouse</h2>
      <p>Join Mouse on his magical journeys through enchanted lands!</p>
      <img src="images/mouse-image.png" alt="Mouse the Cat">
    </section>
  </main>

  <footer>
    <p>&copy; 2025 Mouse's Enchanted Adventures. All rights reserved.</p>
  </footer>

  <script>
    function toggleMenu() {
      document.getElementById('nav-menu').classList.toggle('show');
    }
  </script>
</body>
</html>
